name: carsocial_app
description: A car social media app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Storage & Cache
  shared_preferences: ^2.5.5

  # UI
  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  cached_network_image: ^3.4.1
  intl: ^0.20.2

  # Firebase
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_storage: ^13.2.0
  google_sign_in: ^7.2.0
  firebase_messaging: ^16.1.3
  flutter_local_notifications: ^18.0.1

  # Media
  image_picker: ^1.2.1
  video_player: ^2.11.1
  share_plus: ^10.0.2
  url_launcher: ^6.3.0

  # Maps & Location
  flutter_map: ^8.0.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  latlong2: ^0.9.0

  # Auth & Security
  local_auth: ^2.2.0
  easy_localization: ^3.0.7

  # Caching
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5

  # Time
  timeago: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/translations/
    - assets/images/